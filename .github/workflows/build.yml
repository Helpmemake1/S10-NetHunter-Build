name: Build NetHunter S10 LOS 23.2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Fix APT Mirrors
        # This fixes the 'file:/etc/apt/apt-mirrors.txt' error by using official mirrors
        run: |
          sudo sed -i 's|file:/etc/apt/apt-mirrors.txt|http://archive.ubuntu.com/ubuntu/|g' /etc/apt/sources.list
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex git-core libssl-dev python3 \
          libncurses5-dev xz-utils crossbuild-essential-arm64 curl zip python3-pip
          pip3 install requests

      - name: Clone S10 Kernel Source
        run: |
          git clone --recurse-submodules https://github.com/V0lk3n/nethunter_kernel_samsung_exynos9820.git -b nethunter-lineage-23.2 kernel-source

      - name: Build Kernel (Non-Interactive)
        run: |
          cd kernel-source/kali-nethunter-kernel-builder
          chmod +x build.sh
          
          if [ -f "../nh_files/local.config" ]; then
            cp ../nh_files/local.config .
          fi
          
          echo "Starting build process..."
          # S = Setup, y = Yes to downloads, T = Test Build, yes "" = spam Enter
          (echo S; sleep 3; echo y; sleep 3; echo T; sleep 3; yes "") | ./build.sh

      - name: Upload Resulting Zip
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-S10-LOS23.2
          path: kernel-source/kali-nethunter-kernel-builder/out/*.zip
          
