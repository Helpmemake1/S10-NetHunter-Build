name: Build S10 NetHunter Kernel
on:
  workflow_dispatch:

jobs:
  build_kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LineageOS 23.2
        uses: actions/checkout@v4
        with:
          repository: 'LineageOS/android_kernel_samsung_exynos9820'
          ref: 'lineage-23.2'
          fetch-depth: 1

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev clang lld llvm git zip gcc-aarch64-linux-gnu

      - name: Build Kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Try to find the correct S10 config name automatically
          if [ -f arch/arm64/configs/exynos9820_defconfig ]; then
            CONF=exynos9820_defconfig
          elif [ -f arch/arm64/configs/beyond_defconfig ]; then
            CONF=beyond_defconfig
          else
            # Fallback to the first available samsung config
            CONF=$(ls arch/arm64/configs/ | grep -i "samsung\|beyond\|exynos" | head -n 1)
          fi
          
          echo "Using configuration: $CONF"
          make $CONF
          
          # Force Panda PAU09 (RT2800USB) and HID support
          ./scripts/config --enable CONFIG_RT2X00
          ./scripts/config --enable CONFIG_RT2800USB
          ./scripts/config --enable CONFIG_USB_F_HID
          ./scripts/config --disable CONFIG_CC_STACKPROTECTOR_STRONG
          ./scripts/config --enable CONFIG_CC_STACKPROTECTOR_NONE
          ./scripts/config --disable CONFIG_SAMSUNG_TUI
          
          make -j$(nproc) CC=clang CLANG_TRIPLE=aarch64-linux-gnu-

      - name: Package with AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          cp arch/arm64/boot/Image.gz-dtb AnyKernel3/ || cp arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          sed -i 's/device.name1=/device.name1=beyond1lte/g' anykernel.sh
          sed -i 's/device.name2=/device.name2=beyond1/g' anykernel.sh
          zip -r ../S10-NetHunter-Kernel.zip *

      - name: Upload Flashable Zip
        uses: actions/upload-artifact@v4
        with:
          name: S10-NetHunter-ZIP
          path: S10-NetHunter-Kernel.zip
          
