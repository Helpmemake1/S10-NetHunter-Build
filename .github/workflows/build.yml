name: Build NetHunter Kernel S10 (LOS 23.2)

on:
  workflow_dispatch: # Allows you to start the build manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex git-core libssl-dev python3 libncurses5-dev xz-utils crossbuild-essential-arm64

      - name: Clone Kernel Source
        run: |
          git clone --recurse-submodules https://github.com/V0lk3n/nethunter_kernel_samsung_exynos9820.git -b nethunter-lineage-23.2 kernel-source

      - name: Build Kernel
        run: |
          cd kernel-source/kali-nethunter-kernel-builder
          cp ../nh_files/local.config .
          # Ensure the script is executable
          chmod +x build.sh
          # Start build
          ./build.sh

      - name: Upload Flashable Zip
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-S10-LOS23.2
          path: kernel-source/kali-nethunter-kernel-builder/out/*.zip
          
