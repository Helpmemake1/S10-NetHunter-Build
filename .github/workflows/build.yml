name: Build NetHunter S10 LOS 23.2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex git-core libssl-dev python3 \
          libncurses5-dev xz-utils crossbuild-essential-arm64 curl zip python3-pip
          pip3 install requests

      - name: Clone Kernel Source
        run: |
          # Increased depth to avoid clone timeouts
          git clone --recurse-submodules https://github.com/V0lk3n/nethunter_kernel_samsung_exynos9820.git -b nethunter-lineage-23.2 kernel-source

      - name: Build Kernel (Automated)
        run: |
          cd kernel-source/kali-nethunter-kernel-builder
          
          # Fix permissions and config
          chmod +x build.sh
          if [ -f "../nh_files/local.config" ]; then
            cp ../nh_files/local.config .
          fi
          
          # Automate: S (Setup) then T (Test Build)
          # We add 'y' at the end in case it asks to confirm downloads
          printf "S\ny\nT\n" | ./build.sh

      - name: Upload Flashable Zip
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-S10-LOS23.2
          path: kernel-source/kali-nethunter-kernel-builder/out/*.zip
          if-no-files-found: error
          
