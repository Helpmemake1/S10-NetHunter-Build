name: NetHunter Kernel Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Set up Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex git libssl-dev libncurses5-dev zip

      - name: Build Kernel and Modules
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make exynos9820-beyond1lte_defconfig
          make -j$(nproc)

      - name: Prepare AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          cp arch/arm64/boot/Image.gz-dtb AnyKernel3/
          mkdir -p AnyKernel3/modules
          find . -name "*.ko" -exec cp {} AnyKernel3/modules/ \;
          # Use your custom anykernel.sh
          cp anykernel.sh AnyKernel3/anykernel.sh

      - name: Upload Flashable ZIP
        run: |
          cd AnyKernel3 && zip -r9 ../NetHunter-Kernel-S10.zip *
          
      - name: Export Artifact
        uses: actions/upload-artifact@v3
        with:
          name: NetHunter-Kernel-S10
          path: NetHunter-Kernel-S10.zip
