name: Compile NetHunter Kernel (S10 Exynos9820)
on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python2 python3

      - name: Setup V0lk3n's Linaro 5.5 Toolchains
        run: |
          mkdir -p /home/runner/android/toolchains
          cd /home/runner/android/toolchains
          curl -LO https://kali.download/nethunter-images/toolchains/linaro-aarch64-5.5.tar.xz
          curl -LO https://kali.download/nethunter-images/toolchains/linaro-armhf-5.5.tar.xz
          mkdir linaro-aarch64-5.5 && tar -xf linaro-aarch64-5.5.tar.xz -C linaro-aarch64-5.5 --strip-components=1
          mkdir linaro-armhf-5.5 && tar -xf linaro-armhf-5.5.tar.xz -C linaro-armhf-5.5 --strip-components=1

      - name: Clone LineageOS 23.2 Kernel Source
        run: git clone --depth=1 https://github.com/LineageOS/android_kernel_samsung_exynos9820 s10-kernel

      - name: Clone V0lk3n's Patched Drivers
        run: |
          mkdir -p s10-kernel/drivers/net/wireless/
          git clone --recurse-submodules https://github.com/V0lk3n/nethunter_kernel_samsung_exynos9820.git v0lk3n_repo
          rm -rf s10-kernel/drivers/net/wireless/realtek
          cp -r v0lk3n_repo/drivers/net/wireless/realtek s10-kernel/drivers/net/wireless/
          cp -r v0lk3n_repo/arch/arm64/configs/* s10-kernel/arch/arm64/configs/

      - name: Patch Strict Compiler Errors (The Mali Nuke)
        run: |
          echo "KBUILD_CFLAGS += -Wno-error" >> s10-kernel/Makefile
          echo "KBUILD_CFLAGS += -Wno-unknown-warning-option" >> s10-kernel/Makefile
          find s10-kernel/drivers/ -type f -name "Makefile" -exec sed -i 's/-Werror//g' {} +
          find s10-kernel/drivers/ -type f -name "Kbuild" -exec sed -i 's/-Werror//g' {} +
          
          # TARGETED STRIKE: Mali GPU folder hides flags. Nuke them from all files!
          find s10-kernel/drivers/gpu/ -type f -exec sed -i 's/-Werror//g' {} +
          find s10-kernel/drivers/gpu/ -type f -name "*.mk" -exec sed -i 's/-Werror//g' {} +

      - name: Setup Kali Kernel Builder
        run: |
          git clone https://gitlab.com/kalilinux/nethunter/build-scripts/kali-nethunter-kernel-builder.git
          mv kali-nethunter-kernel-builder s10-kernel/

      - name: Run Automated Build & Catch Crashes
        run: |
          cd s10-kernel/kali-nethunter-kernel-builder
          cp ../../v0lk3n_repo/nh_files/local.config .
          cp ../arch/arm64/configs/nethunter_beyond1lte_defconfig ../arch/arm64/configs/nethunter_defconfig
          
          echo -e "0\nT\nn\n" | ./build.sh 2>&1 | tee build_log.txt
          grep -i "error" build_log.txt | grep -v -i "warning" > crash_report.txt || true
          cat crash_report.txt

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: S10-Build-Results
          path: |
            s10-kernel/kali-nethunter-kernel-builder/output/*.zip
            s10-kernel/kali-nethunter-kernel-builder/crash_report.txt
