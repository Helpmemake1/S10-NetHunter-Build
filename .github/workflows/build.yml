name: Build NetHunter S10 LOS 23.2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex git-core libssl-dev python3 \
          libncurses5-dev xz-utils crossbuild-essential-arm64 curl zip python3-pip
          pip3 install requests

      - name: Clone S10 Kernel Source
        run: |
          # Cloning specific LOS 23.2 branch
          git clone --recurse-submodules https://github.com/V0lk3n/nethunter_kernel_samsung_exynos9820.git -b nethunter-lineage-23.2 kernel-source

      - name: Build Kernel (Non-Interactive)
        run: |
          cd kernel-source/kali-nethunter-kernel-builder
          chmod +x build.sh
          
          # Copy local config if it exists
          if [ -f "../nh_files/local.config" ]; then
            cp ../nh_files/local.config .
          fi

          # AUTOMATION LOGIC:
          # 1. 'S' -> Setup toolchains
          # 2. 'y' -> Confirm downloads
          # 3. 'T' -> Start Test Build (Flashable Zip)
          # 4. 'yes ""' -> Spam Enter to skip all hidden "Enable feature X?" questions
          
          echo "Starting build process..."
          (echo S; sleep 2; echo y; sleep 2; echo T; sleep 2; yes "") | ./build.sh

      - name: Upload Resulting Zip
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-S10-Beyond1lte-LOS23.2
          path: kernel-source/kali-nethunter-kernel-builder/out/*.zip
          if-no-files-found: error
          
