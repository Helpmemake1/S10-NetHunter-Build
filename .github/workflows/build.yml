name: Build S10 NetHunter Kernel
on:
  workflow_dispatch:

jobs:
  build_kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LineageOS 23.2
        uses: actions/checkout@v4
        with:
          repository: 'LineageOS/android_kernel_samsung_exynos9820'
          ref: 'lineage-23.2'
          fetch-depth: 1

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev clang lld llvm git zip gcc-aarch64-linux-gnu

      - name: Configure Kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          make exynos9820-beyond0lte_defconfig
          
          # --- STABLE NETWORKING STACK ---
          ./scripts/config --enable CONFIG_CFG80211
          ./scripts/config --enable CONFIG_MAC80211
          
          # --- PANDA PAU09 (RT2800USB) AS EXTERNAL MODULES ---
          # We use 'm' for module to prevent the main Image from crashing
          ./scripts/config --module CONFIG_RT2X00
          ./scripts/config --module CONFIG_RT2800USB
          ./scripts/config --module CONFIG_RT2800USB_RT5572
          ./scripts/config --module CONFIG_ATH9K_HTC
          
          # --- HID & SECURITY ---
          ./scripts/config --enable CONFIG_USB_F_HID
          ./scripts/config --disable CONFIG_CC_STACKPROTECTOR_STRONG
          ./scripts/config --enable CONFIG_CC_STACKPROTECTOR_NONE
          ./scripts/config --disable CONFIG_SAMSUNG_TUI
          
          make olddefconfig

      - name: Build Kernel and Modules
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          # Build the main kernel
          make -j$(nproc) CC=clang CLANG_TRIPLE=aarch64-linux-gnu-
          # Build the driver files separately
          make -j$(nproc) modules CC=clang CLANG_TRIPLE=aarch64-linux-gnu-

      - name: Package with AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          cp arch/arm64/boot/Image.gz-dtb AnyKernel3/ || cp arch/arm64/boot/Image AnyKernel3/
          
          # Create a modules folder and find the built Panda drivers
          mkdir -p AnyKernel3/modules
          find . -name "*.ko" -exec cp {} AnyKernel3/modules/ \;
          
          cd AnyKernel3
          sed -i 's/device.name1=/device.name1=beyond1lte/g' anykernel.sh
          sed -i 's/device.name2=/device.name2=beyond1/g' anykernel.sh
          zip -r ../S10-NetHunter-Kernel.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: S10-Stable-Kernel
          path: S10-NetHunter-Kernel.zip
          
