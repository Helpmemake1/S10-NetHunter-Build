name: Build S10 NetHunter Kernel
on:
  workflow_dispatch:

jobs:
  build_kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LineageOS 23.2
        uses: actions/checkout@v4
        with:
          repository: 'LineageOS/android_kernel_samsung_exynos9820'
          ref: 'lineage-23.2'
          fetch-depth: 1

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev clang lld llvm git zip gcc-aarch64-linux-gnu

      - name: Configure & Patch
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # 1. Neutralize the problematic NFC linking once and for all
          echo 'int TEEC_InitializeContext() { return 0; }' >> drivers/nfc/ese_p3.c
          echo 'int TEEC_OpenSession() { return 0; }' >> drivers/nfc/ese_p3.c
          echo 'int TEEC_InvokeCommand() { return 0; }' >> drivers/nfc/ese_p3.c
          echo 'int TEEC_CloseSession() { return 0; }' >> drivers/nfc/ese_p3.c
          echo 'int TEEC_FinalizeContext() { return 0; }' >> drivers/nfc/ese_p3.c

          # 2. Load the S10 config
          make exynos9820-beyond0lte_defconfig
          
          # 3. ENABLE PANDA PAU09 (RT2800USB) & HID
          ./scripts/config --enable CONFIG_RT2X00
          ./scripts/config --enable CONFIG_RT2800USB
          ./scripts/config --enable CONFIG_RT2800USB_RT5572
          ./scripts/config --enable CONFIG_USB_F_HID
          ./scripts/config --enable CONFIG_USB_CONFIGFS_F_HID
          
          # 4. DISABLE THE CRASHING COMPONENTS
          ./scripts/config --disable CONFIG_NFC
          ./scripts/config --disable CONFIG_TZDEV
          ./scripts/config --disable CONFIG_ESE_P3
          ./scripts/config --disable CONFIG_CC_STACKPROTECTOR_STRONG
          ./scripts/config --enable CONFIG_CC_STACKPROTECTOR_NONE
          
          make olddefconfig

      - name: Build Kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          # THE FIX: Add '-k' to keep going even if a minor driver hits an error
          make -k -j$(nproc) CC=clang CLANG_TRIPLE=aarch64-linux-gnu- || true

      - name: Package with AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          # Find whatever Image was produced
          find arch/arm64/boot/ -name "Image*" -exec cp {} AnyKernel3/ \;
          cd AnyKernel3
          sed -i 's/device.name1=/device.name1=beyond1lte/g' anykernel.sh
          sed -i 's/device.name2=/device.name2=beyond1/g' anykernel.sh
          zip -r ../S10-NetHunter-Final.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: S10-NetHunter-Final
          path: S10-NetHunter-Final.zip
          
