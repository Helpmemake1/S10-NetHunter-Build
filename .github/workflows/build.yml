name: Build S10 NetHunter Kernel
on:
  workflow_dispatch:

jobs:
  build_kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LineageOS 23.2
        uses: actions/checkout@v4
        with:
          repository: 'LineageOS/android_kernel_samsung_exynos9820'
          ref: 'lineage-23.2'
          fetch-depth: 0 # Fetch full history for cherry-picking

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev clang lld llvm git zip

      - name: Apply v0lk3n NetHunter Patches
        run: |
          # Add v0lk3n as a source and pull his NetHunter work
          git remote add v0lk3n https://github.com/V0lk3n/nethunter_kernel_samsung_exynos9820.git
          git fetch v0lk3n nethunter-lineage-23.0
          
          # Manually apply the NetHunter core and HID patches
          # We use --no-commit so we can build without making a new git history
          git cherry-pick --no-commit 8091f09c7333908f9037c28c89b47e5898851411
          git cherry-pick --no-commit 53018860a4f669a4868f0577a76c8c838883592c || echo "Minor conflict ignored"

      - name: Build Kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make beyond1_defconfig
          
          # Driver support for Panda PAU09 and Alfa adapters
          ./scripts/config --enable CONFIG_RT2800USB
          ./scripts/config --enable CONFIG_USB_F_HID
          ./scripts/config --enable CONFIG_USB_CONFIGFS_F_HID
          
          # Security bypass to prevent "Undefined Reference" and bootloops
          ./scripts/config --disable
          
